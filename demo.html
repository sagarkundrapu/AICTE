<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Certificate Verification</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      .container {
        background-color: #fff;
        border: 2px solid;
        border-radius: 15px;
        border-image: linear-gradient(to right, blue, orange) 1;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        padding: 30px;
        text-align: center;
        max-width: 600px;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      h2 {
        color: #004ae9;
        margin-top: 20px;
        font-size: 24px;
      }

      p {
        font-size: 18px;
        margin: 10px 0;
      }

      .verification-icon {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background-color: green;
        color: white;
        font-size: 40px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        margin-top: 30px;
        margin-bottom: 20px;
      }

      .verification-icon::before {
        content: "\2714";
        font-size: 36px;
      }

      .logo {
        height: 50px;
        margin-top: 20px;
      }

      table {
        width: 80%;
        margin-top: 20px;
        border-spacing: 4px;
      }

      table td {
        padding: 2px;
        text-align: left;
      }

      table td strong {
        color: #333;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Logo -->
      <img src="https://lmsapi.eduskills.academy/assets/LOGO_EduSkills.png" alt="Logo" class="logo" />

      <!-- Verification Icon (Checkmark) -->
      <div class="verification-icon"></div>

      <!-- Success Message -->
      <h2>Your Certificate has been verified successfully</h2>

      <!-- Certificate Details Table -->
      <table align="center">
        <tr>
          <td>
            <p><strong>Name:</strong></p>
          </td>
          <td><p>Satyam   Shivam</p></td>
        </tr>
        <tr>
          <td>
            <p><strong>Domain:</strong></p>
          </td>
          <td><p>DevOps & Cloud Automation</p></td>
        </tr>
        <tr>
          <td>
            <p><strong>Certificate Code:</strong></p>
          </td>
          <td><p>2026-0D1AE3E632</p></td>
        </tr>
        <tr>
          <td>
            <p><strong>Certificate Issue Date:</strong></p>
          </td>
          <td><p>2026-03-03</p></td>
        </tr>
      </table>
    </div>
